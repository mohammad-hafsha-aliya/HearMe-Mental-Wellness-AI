<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HearMe - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2d5d7b;
            --primary-light: #4a8fb5;
            --accent: #84b59f;
            --bg-main: #faf8f5;
            --bg-card: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 3rem 2rem 2rem;
            text-align: center;
            color: white;
        }

        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p { opacity: 0.9; font-size: 0.95rem; }

        .auth-body { padding: 2.5rem; }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fff;
            color: var(--text-primary);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(74,143,181,0.1);
        }

        input.invalid { border-color: var(--error); }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(45,93,123,0.3);
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,93,123,0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-message, .success-message {
            padding: 0.875rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .error-message { background: #fee2e2; color: var(--error); border: 1px solid #fca5a5; }
        .success-message { background: #d1fae5; color: var(--success); border: 1px solid #6ee7b7; }
        .error-message.show, .success-message.show { display: block; }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .password-strength {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { width: 33%; background: var(--error); }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: var(--success); }

        .helper-text { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }

        @media (max-width: 640px) {
            .auth-container { max-width: 100%; }
            .auth-header h1 { font-size: 2rem; }
            .auth-body { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🎧 HearMe</h1>
            <p>Your Mental Wellness Companion</p>
        </div>
        <div class="auth-body">
            <div class="tabs">
                <button class="tab active" onclick="switchAuthTab('login', this)">Login</button>
                <button class="tab" onclick="switchAuthTab('register', this)">Register</button>
            </div>

            <div id="error-message" class="error-message" role="alert"></div>
            <div id="success-message" class="success-message" role="status"></div>

            <!-- Login Form -->
            <form id="login-form" class="form-section active" onsubmit="handleLogin(event)" novalidate>
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required autocomplete="username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                <button type="submit" class="submit-btn" id="login-btn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="form-section" onsubmit="handleRegister(event)" novalidate>
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" required autocomplete="username"
                        minlength="3" placeholder="Choose a username" oninput="clearFieldError(this)">
                    <div class="helper-text">Minimum 3 characters, letters/numbers/underscores only</div>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" required autocomplete="email"
                        placeholder="your@email.com" oninput="clearFieldError(this)">
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" required autocomplete="new-password"
                        minlength="8" placeholder="Choose a strong password"
                        oninput="checkPasswordStrength(this.value); clearFieldError(this)">
                    <div class="password-strength">
                        <div id="password-strength-bar" class="password-strength-bar"></div>
                    </div>
                    <div class="helper-text">Minimum 8 characters</div>
                </div>
                <div class="form-group">
                    <label for="register-password-confirm">Confirm Password</label>
                    <input type="password" id="register-password-confirm" required autocomplete="new-password"
                        placeholder="Repeat your password" oninput="clearFieldError(this)">
                </div>
                <button type="submit" class="submit-btn" id="register-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        function switchAuthTab(tab, btnEl) {
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));
            document.getElementById(`${tab}-form`).classList.add('active');
            hideMessages();
        }

        function checkPasswordStrength(password) {
            const bar = document.getElementById('password-strength-bar');
            bar.className = 'password-strength-bar';
            if (!password) return;

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^a-zA-Z\d]/)) strength++;

            if (strength >= 4) bar.classList.add('strength-strong');
            else if (strength >= 2) bar.classList.add('strength-medium');
            else bar.classList.add('strength-weak');
        }

        function clearFieldError(input) {
            input.classList.remove('invalid');
        }

        function showError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.classList.add('show');
            document.getElementById('success-message').classList.remove('show');
        }

        function showSuccess(message) {
            const el = document.getElementById('success-message');
            el.textContent = message;
            el.classList.add('show');
            document.getElementById('error-message').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('error-message').classList.remove('show');
            document.getElementById('success-message').classList.remove('show');
        }

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    showError(data.error || 'Login failed');
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            } catch (error) {
                showError('Connection error. Please make sure the server is running.');
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;
            const btn = document.getElementById('register-btn');

            // Client-side validation
            if (!username || !email || !password || !passwordConfirm) {
                showError('Please fill in all fields');
                return;
            }

            if (password !== passwordConfirm) {
                showError('Passwords do not match');
                document.getElementById('register-password-confirm').classList.add('invalid');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                document.getElementById('register-password').classList.add('invalid');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => { window.location.href = '/'; }, 1000);
                } else {
                    showError(data.error || 'Registration failed');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (error) {
                showError('Connection error. Please make sure the server is running.');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        // Check if already logged in
        (async () => {
            try {
                const res = await fetch(`${API_URL}/auth/user`, { credentials: 'include' });
                if (res.ok) window.location.href = '/';
            } catch (_) {}
        })();
    </script>
</body>
</html>
